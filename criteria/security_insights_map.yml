# criteria/security_insights_map.yml
#
# Mapping from security-insights.yml fields to badge criteria proposals,
# to enable automation.
#
# To update # Target: comment blocks run:
#   ruby script/update_security_insights_comments.rb
#
# Each entry maps one security-insights.yml field condition to one badge
# target criterion.  Multiple entries may share the same si_path (one per
# target); multiple entries may share the same target_criterion (one per
# source field or condition).  The detective takes the highest-confidence
# proposal for each target.
#
# si_path: dot-notation path into the parsed security-insights YAML.
#   Hyphens in key names are allowed (e.g. "vulnerability-reporting").
#
# si_condition: how to evaluate the value at si_path:
#   "true"                      - boolean field equals true
#   "false"                     - boolean field equals false
#   "present"                   - field exists with a non-nil/non-empty value
#   "equals"                    - string field equals si_value
#   "in"                        - string field value is listed in si_values
#   "has_tool_type"             - security.tools[] contains type == si_value
#   "has_tool_type_in_ci"       - security.tools[] contains type == si_value
#                                 AND integration.ci == true
#   "has_attestation_predicate" - release.attestations[] has predicate-uri
#                                 containing si_value as a substring
#
# si_value: string value for equals / has_* conditions
# si_values: list of strings for the "in" condition
#
# target_criterion: badge field name (metal or baseline)
# inferred_status: Met | Unmet | N/A
# confidence: 1-3 (always < Chief::CONFIDENCE_OVERRIDE of 4)
#   1 = weak signal; worth surfacing but treat with caution
#   2 = moderate confidence; partial or related requirement
#   3 = strong confidence; essentially the same requirement
#
# Target criterion descriptions (from config/locales/en.yml) appear as
# # Target: comment blocks below each target_criterion line.
# These are maintained by script/update_security_insights_comments.rb.
# DO NOT edit # Target: blocks by hand; run the script instead:
#   ruby script/update_security_insights_comments.rb

mappings:

  # ---------------------------------------------------------------------------
  # Vulnerability Reporting (project.vulnerability-reporting)
  # ---------------------------------------------------------------------------

  # project.vulnerability-reporting.reports-accepted
  # Type: Boolean (required in VulnerabilityReporting)
  # Whether the project accepts vulnerability reports from external parties.

  - si_path: project.vulnerability-reporting.reports-accepted
    si_condition: "true"
    target_criterion: vulnerability_report_process
    # Target:
    #   description: "The project MUST publish the process for reporting
    #     vulnerabilities on the project site."
    #   details: "Projects hosted on GitHub SHOULD consider enabling privately
    #     reporting a security vulnerability. Projects on GitLab SHOULD
    #     consider using its ability for privately reporting a vulnerability.
    #     Projects MAY identify a mailing address on
    #     https://PROJECTSITE/security, often in the form security@example.org.
    #     This vulnerability reporting process MAY be the same as its bug
    #     reporting process. Vulnerability reports MAY always be public, but
    #     many projects have a private vulnerability reporting mechanism."
    inferred_status: Met
    confidence: 2

  - si_path: project.vulnerability-reporting.reports-accepted
    si_condition: "false"
    target_criterion: vulnerability_report_process
    # Target:
    #   description: "The project MUST publish the process for reporting
    #     vulnerabilities on the project site."
    #   details: "Projects hosted on GitHub SHOULD consider enabling privately
    #     reporting a security vulnerability. Projects on GitLab SHOULD
    #     consider using its ability for privately reporting a vulnerability.
    #     Projects MAY identify a mailing address on
    #     https://PROJECTSITE/security, often in the form security@example.org.
    #     This vulnerability reporting process MAY be the same as its bug
    #     reporting process. Vulnerability reports MAY always be public, but
    #     many projects have a private vulnerability reporting mechanism."
    # Note: false means the project actively states it does not accept reports,
    # which makes it very likely no reporting process has been published.
    # A project could theoretically publish a process that says "we don't accept
    # reports," but this is unusual; confidence 2 (not 3) reflects that edge case.
    inferred_status: Unmet
    confidence: 2

  - si_path: project.vulnerability-reporting.reports-accepted
    si_condition: "true"
    target_criterion: vulnerability_report_response
    # Target:
    #   description: "The project's initial response time for any vulnerability
    #     report received in the last 6 months MUST be less than or equal to 14
    #     days."
    #   details: "If there have been no vulnerabilities reported in the last 6
    #     months, choose "not applicable" (N/A)."
    # Note: Accepting reports is a necessary condition for responding to them,
    # but says nothing about actual response speed.  Confidence 1 (weak signal).
    inferred_status: Met
    confidence: 1

  - si_path: project.vulnerability-reporting.reports-accepted
    si_condition: "true"
    target_criterion: osps_vm_03_01
    # Target:
    #   description: "While active, the project documentation MUST provide a
    #     means for private vulnerability reporting directly to the security
    #     contacts within the project."
    #   details: "Provide a means for security researchers to report
    #     vulnerabilities privately to the project. This may be a dedicated
    #     email address, a web form, VCS specialized tools, email addresses for
    #     security contacts, or other methods."
    # Note: reports-accepted=true means reports are accepted, but says nothing
    # about whether the channel is *private*.  A project that accepts only public
    # issue reports satisfies reports-accepted but not osps_vm_03_01.  Confidence
    # 1 (weak signal); a stronger signal is pgp-key or contact email being present.
    inferred_status: Met
    confidence: 1

  - si_path: project.vulnerability-reporting.reports-accepted
    si_condition: "false"
    target_criterion: osps_vm_03_01
    # Target:
    #   description: "While active, the project documentation MUST provide a
    #     means for private vulnerability reporting directly to the security
    #     contacts within the project."
    #   details: "Provide a means for security researchers to report
    #     vulnerabilities privately to the project. This may be a dedicated
    #     email address, a web form, VCS specialized tools, email addresses for
    #     security contacts, or other methods."
    inferred_status: Unmet
    confidence: 3

  # project.vulnerability-reporting.policy
  # Type: URL (optional)
  # URL of the project's coordinated vulnerability disclosure (CVD) policy.

  - si_path: project.vulnerability-reporting.policy
    si_condition: "present"
    target_criterion: vulnerability_report_process
    # Target:
    #   description: "The project MUST publish the process for reporting
    #     vulnerabilities on the project site."
    #   details: "Projects hosted on GitHub SHOULD consider enabling privately
    #     reporting a security vulnerability. Projects on GitLab SHOULD
    #     consider using its ability for privately reporting a vulnerability.
    #     Projects MAY identify a mailing address on
    #     https://PROJECTSITE/security, often in the form security@example.org.
    #     This vulnerability reporting process MAY be the same as its bug
    #     reporting process. Vulnerability reports MAY always be public, but
    #     many projects have a private vulnerability reporting mechanism."
    inferred_status: Met
    confidence: 2

  - si_path: project.vulnerability-reporting.policy
    si_condition: "present"
    target_criterion: osps_vm_01_01
    # Target:
    #   description: "While active, the project documentation MUST include a
    #     policy for coordinated vulnerability disclosure (CVD), with a clear
    #     timeframe for response."
    #   details: "Create a SECURITY.md file at the root of the directory,
    #     outlining the project's policy for coordinated vulnerability
    #     disclosure. Include a method for reporting vulnerabilities. Set
    #     expectations for how the project will respond and address reported
    #     issues."
    inferred_status: Met
    confidence: 2

  # project.vulnerability-reporting.pgp-key
  # Type: String (optional)
  # PGP key (or fingerprint/URL) for encrypted vulnerability report submission.

  - si_path: project.vulnerability-reporting.pgp-key
    si_condition: "present"
    target_criterion: vulnerability_report_private
    # Target:
    #   description: "If private vulnerability reports are supported, the
    #     project MUST include how to send the information in a way that is
    #     kept private."
    #   details: "Examples include a private defect report submitted on the web
    #     using HTTPS (TLS) or an email encrypted using OpenPGP. If
    #     vulnerability reports are always public (so there are never private
    #     vulnerability reports), choose "not applicable" (N/A)."
    inferred_status: Met
    confidence: 2

  # ---------------------------------------------------------------------------
  # Repository Documentation (repository.documentation)
  # ---------------------------------------------------------------------------

  # repository.documentation.contributing-guide
  # Type: URL (optional)
  # URL of a guide explaining how to contribute to the project.

  - si_path: repository.documentation.contributing-guide
    si_condition: "present"
    target_criterion: contribution
    # Target:
    #   description: "The information on how to contribute MUST explain the
    #     contribution process (e.g., are pull requests used?)"
    #   details: "We presume that projects on GitHub use issues and pull
    #     requests unless otherwise noted. This information can be short, e.g.,
    #     stating that the project uses pull requests, an issue tracker, or
    #     posts to a mailing list (which one?)"
    inferred_status: Met
    confidence: 2

  - si_path: repository.documentation.contributing-guide
    si_condition: "present"
    target_criterion: osps_gv_03_01
    # Target:
    #   description: "While active, the project documentation MUST include an
    #     explanation of the contribution process."
    #   details: "Create a CONTRIBUTING.md or CONTRIBUTING/ directory to
    #     outline the contribution process including the steps for submitting
    #     changes, and engaging with the project maintainers."
    inferred_status: Met
    confidence: 2

  # repository.documentation.security-policy
  # Type: URL (optional)
  # URL of the project's security policy document (e.g. SECURITY.md).

  - si_path: repository.documentation.security-policy
    si_condition: "present"
    target_criterion: osps_vm_01_01
    # Target:
    #   description: "While active, the project documentation MUST include a
    #     policy for coordinated vulnerability disclosure (CVD), with a clear
    #     timeframe for response."
    #   details: "Create a SECURITY.md file at the root of the directory,
    #     outlining the project's policy for coordinated vulnerability
    #     disclosure. Include a method for reporting vulnerabilities. Set
    #     expectations for how the project will respond and address reported
    #     issues."
    inferred_status: Met
    confidence: 2

  - si_path: repository.documentation.security-policy
    si_condition: "present"
    target_criterion: osps_vm_02_01
    # Target:
    #   description: "While active, the project documentation MUST contain
    #     security contacts."
    #   details: "Create a security.md (or similarly-named) file that contains
    #     security contacts for the project."
    inferred_status: Met
    confidence: 2

  # Considered and excluded: security-policy → osps_do_02_01
  # osps_do_02_01 requires a guide for reporting *defects* (general bugs).
  # The SI security-policy field is specifically a *security* vulnerability
  # disclosure policy, which is a distinct document from a defect-reporting
  # guide.  The overlap is too weak to infer Met, so this mapping is omitted.
  # (osps_do_02_01 is already detected by RepoFilesExamineDetective via SECURITY.md)

  # repository.documentation.governance
  # Type: URL (optional)
  # URL of a governance document describing project roles and responsibilities.

  - si_path: repository.documentation.governance
    si_condition: "present"
    target_criterion: osps_gv_01_01
    # Target:
    #   description: "While active, the project documentation MUST include a
    #     list of project members with access to sensitive resources."
    #   details: "Document project participants and their roles through such
    #     artifacts as members.md, governance.md, maintainers.md, or similar
    #     file within the source code repository of the project. This may be as
    #     simple as including names or account handles in a list of
    #     maintainers, or more complex depending on the project's governance."
    inferred_status: Met
    confidence: 1

  - si_path: repository.documentation.governance
    si_condition: "present"
    target_criterion: osps_gv_01_02
    # Target:
    #   description: "While active, the project documentation MUST include
    #     descriptions of the roles and responsibilities for members of the
    #     project."
    #   details: "Document project participants and their roles through such
    #     artifacts as members.md, governance.md, maintainers.md, or similar
    #     file within the source code repository of the project."
    inferred_status: Met
    confidence: 1

  # repository.documentation.review-policy
  # Type: URL (optional)
  # URL of a documented code review policy for the repository.

  - si_path: repository.documentation.review-policy
    si_condition: "present"
    target_criterion: osps_qa_07_01
    # Target:
    #   description: "When a commit is made to the primary branch, the
    #     project's version control system MUST require at least one non-author
    #     human approval of the changes before merging."
    #   details: "Configure the project's version control system to require at
    #     least one non-author human approval of changes before merging into
    #     the release or primary branch. This can be achieved by requiring a
    #     pull request to be reviewed and approved by at least one other
    #     collaborator before it can be merged."
    # Note: osps_qa_07_01 requires VCS *enforcement*, not just a written policy.
    # A review-policy URL shows the policy exists; enforcement is inferred at
    # confidence 1 only.
    inferred_status: Met
    confidence: 1

  # repository.documentation.dependency-management-policy
  # Type: URL (optional)
  # URL of a policy describing how dependencies are selected, obtained, and tracked.

  - si_path: repository.documentation.dependency-management-policy
    si_condition: "present"
    target_criterion: osps_do_06_01
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST include a description of how the project selects,
    #     obtains, and tracks its dependencies."
    #   details: "It is recommended to publish this information alongside the
    #     project's technical & design documentation on a publicly viewable
    #     resource such as the source code repository, project website, or
    #     other channel."
    inferred_status: Met
    confidence: 2

  - si_path: repository.documentation.dependency-management-policy
    si_condition: "present"
    target_criterion: osps_vm_05_01
    # Target:
    #   description: "While active, the project documentation MUST include a
    #     policy that defines a threshold for remediation of SCA findings
    #     related to vulnerabilities and licenses."
    #   details: "Document a policy in the project that defines a threshold for
    #     remediation of SCA findings related to vulnerabilities and licenses.
    #     Include the process for identifying, prioritizing, and remediating
    #     these findings."
    inferred_status: Met
    confidence: 1

  # repository.documentation.code-of-conduct
  # Type: URL (optional)
  # URL of the project's code of conduct document.

  - si_path: repository.documentation.code-of-conduct
    si_condition: "present"
    target_criterion: code_of_conduct
    # Target:
    #   description: "The project MUST adopt a code of conduct and post it in a
    #     standard location."
    #   details: "Projects may be able to improve the civility of their
    #     community and to set expectations about acceptable conduct by
    #     adopting a code of conduct. This can help avoid problems before they
    #     occur and make the project a more welcoming place to encourage
    #     contributions. This should focus only on behavior within the
    #     community/workplace of the project. Example codes of conduct are the
    #     Linux kernel code of conduct, the Contributor Covenant Code of
    #     Conduct, the Debian Code of Conduct, the Ubuntu Code of Conduct, the
    #     Fedora Code of Conduct, the GNOME Code Of Conduct, the KDE Community
    #     Code of Conduct, the Python Community Code of Conduct, The Ruby
    #     Community Conduct Guideline, and The Rust Code of Conduct."
    inferred_status: Met
    confidence: 2

  # ---------------------------------------------------------------------------
  # Repository Status (repository.status)
  # ---------------------------------------------------------------------------

  # repository.status
  # Type: String (required); one of: active, abandoned, concept, inactive,
  #   moved, suspended, unsupported, WIP
  # Lifecycle state of the repository.

  - si_path: repository.status
    si_condition: equals
    si_value: active
    target_criterion: maintained
    # Target:
    #   description: "The project MUST be maintained."
    #   details: "As a minimum, the project should attempt to respond to
    #     significant problem and vulnerability reports. A project that is
    #     actively pursuing a badge is probably maintained. All projects and
    #     people have limited resources, and typical projects must reject some
    #     proposed changes, so limited resources and proposal rejections do not
    #     by themselves indicate an unmaintained project. When a project knows
    #     that it will no longer be maintained, it should set this criterion to
    #     "Unmet" and use the appropriate mechanism(s) to indicate to others
    #     that it is not being maintained. For example, use “DEPRECATED” as the
    #     first heading of its README, add “DEPRECATED” near the beginning of
    #     its home page, add “DEPRECATED” to the beginning of its code
    #     repository project description, add a no-maintenance-intended badge
    #     in its README and/or home page, mark it as deprecated in any package
    #     repositories (e.g., npm deprecate), and/or use the code repository's
    #     marking system to archive it (e.g., GitHub's "archive" setting,
    #     GitLab’s "archived" marking, Gerrit's "readonly" status, or
    #     SourceForge’s "abandoned" project status). Additional discussion can
    #     be found here."
    inferred_status: Met
    confidence: 2

  - si_path: repository.status
    si_condition: in
    si_values: [abandoned, inactive, suspended, unsupported]
    target_criterion: maintained
    # Target:
    #   description: "The project MUST be maintained."
    #   details: "As a minimum, the project should attempt to respond to
    #     significant problem and vulnerability reports. A project that is
    #     actively pursuing a badge is probably maintained. All projects and
    #     people have limited resources, and typical projects must reject some
    #     proposed changes, so limited resources and proposal rejections do not
    #     by themselves indicate an unmaintained project. When a project knows
    #     that it will no longer be maintained, it should set this criterion to
    #     "Unmet" and use the appropriate mechanism(s) to indicate to others
    #     that it is not being maintained. For example, use “DEPRECATED” as the
    #     first heading of its README, add “DEPRECATED” near the beginning of
    #     its home page, add “DEPRECATED” to the beginning of its code
    #     repository project description, add a no-maintenance-intended badge
    #     in its README and/or home page, mark it as deprecated in any package
    #     repositories (e.g., npm deprecate), and/or use the code repository's
    #     marking system to archive it (e.g., GitHub's "archive" setting,
    #     GitLab’s "archived" marking, Gerrit's "readonly" status, or
    #     SourceForge’s "abandoned" project status). Additional discussion can
    #     be found here."
    inferred_status: Unmet
    confidence: 2

  # ---------------------------------------------------------------------------
  # Security Tools (repository.security.tools)
  # ---------------------------------------------------------------------------

  # repository.security.tools[type=SAST]
  # SecurityTool with type "SAST" (Static Application Security Testing).
  # integration.ci: true means the tool runs in the CI/CD pipeline.

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: SAST
    target_criterion: static_analysis
    # Target:
    #   description: "At least one static code analysis tool (beyond compiler
    #     warnings and "safe" language modes) MUST be applied to any proposed
    #     major production release of the software before its release, if there
    #     is at least one FLOSS tool that implements this criterion in the
    #     selected language."
    #   details: "A static code analysis tool examines the software code (as
    #     source code, intermediate code, or executable) without executing it
    #     with specific inputs. For purposes of this criterion, compiler
    #     warnings and "safe" language modes do not count as static code
    #     analysis tools (these typically avoid deep analysis because speed is
    #     vital). Some static analysis tools focus on detecting generic
    #     defects, others focus on finding specific kinds of defects (such as
    #     vulnerabilities), and some do a combination. Examples of such static
    #     code analysis tools include cppcheck (C, C++), clang static analyzer
    #     (C, C++), SpotBugs (Java), FindBugs (Java) (including
    #     FindSecurityBugs), PMD (Java), Brakeman (Ruby on Rails), lintr (R),
    #     goodpractice (R), Coverity Quality Analyzer, SonarQube, Codacy, and
    #     HP Enterprise Fortify Static Code Analyzer. Larger lists of tools can
    #     be found in places such as the Wikipedia list of tools for static
    #     code analysis, OWASP information on static code analysis, NIST list
    #     of source code security analyzers, and Wheeler's list of static
    #     analysis tools. If there are no FLOSS static analysis tools available
    #     for the implementation language(s) used, you may select 'N/A'."
    inferred_status: Met
    confidence: 2

  - si_path: repository.security.tools
    si_condition: has_tool_type_in_ci
    si_value: SAST
    target_criterion: static_analysis_fixed
    # Target:
    #   description: "All medium and higher severity exploitable
    #     vulnerabilities discovered with static code analysis MUST be fixed in
    #     a timely way after they are confirmed."
    #   details: "A vulnerability is considered medium or higher severity if
    #     its Common Vulnerability Scoring System (CVSS) base qualitative score
    #     is medium or higher. In CVSS versions 2.0 through 3.1, this is
    #     equivalent to a CVSS score of 4.0 or higher. Projects may use the
    #     CVSS score as published in a widely-used vulnerability database (such
    #     as the National Vulnerability Database) using the most-recent version
    #     of CVSS reported in that database. Projects may instead calculate the
    #     severity themselves using the latest version of CVSS at the time of
    #     the vulnerability disclosure, if the calculation inputs are publicly
    #     revealed once the vulnerability is publicly known. Note that
    #     criterion vulnerabilities_fixed_60_days requires that all such
    #     vulnerabilities be fixed within 60 days of being made public."
    inferred_status: Met
    confidence: 1

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: SAST
    target_criterion: osps_vm_06_02
    # Target:
    #   description: "While active, all changes to the project's codebase MUST
    #     be automatically evaluated against a documented policy for security
    #     weaknesses and blocked in the event of violations except when
    #     declared and suppressed as non-exploitable."
    #   details: "Create a status check in the project's version control system
    #     that runs a Static Application Security Testing (SAST) tool on all
    #     changes to the codebase. Require that the status check passes before
    #     changes can be merged."
    inferred_status: Met
    confidence: 1

  - si_path: repository.security.tools
    si_condition: has_tool_type_in_ci
    si_value: SAST
    target_criterion: osps_vm_06_02
    # Target:
    #   description: "While active, all changes to the project's codebase MUST
    #     be automatically evaluated against a documented policy for security
    #     weaknesses and blocked in the event of violations except when
    #     declared and suppressed as non-exploitable."
    #   details: "Create a status check in the project's version control system
    #     that runs a Static Application Security Testing (SAST) tool on all
    #     changes to the codebase. Require that the status check passes before
    #     changes can be merged."
    inferred_status: Met
    confidence: 2

  # repository.security.tools[type=SCA]
  # SecurityTool with type "SCA" (Software Composition Analysis / dependency scanning).

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: SCA
    target_criterion: dependency_monitoring
    # Target:
    #   description: "Projects MUST monitor or periodically check their
    #     external dependencies (including convenience copies) to detect known
    #     vulnerabilities, and fix exploitable vulnerabilities or verify them
    #     as unexploitable."
    #   details: "This can be done using an origin analyzer / dependency
    #     checking tool / software composition analysis tool such as OWASP's
    #     Dependency-Check, Sonatype's Nexus Auditor, Synopsys' Black Duck
    #     Software Composition Analysis, and Bundler-audit (for Ruby). Some
    #     package managers include mechanisms to do this. It is acceptable if
    #     the components' vulnerability cannot be exploited, but this analysis
    #     is difficult and it is sometimes easier to simply update or fix the
    #     part."
    inferred_status: Met
    confidence: 2

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: SCA
    target_criterion: osps_vm_05_03
    # Target:
    #   description: "While active, all changes to the project's codebase MUST
    #     be automatically evaluated against a documented policy for malicious
    #     dependencies and known vulnerabilities in dependencies, then blocked
    #     in the event of violations, except when declared and suppressed as
    #     non-exploitable."
    #   details: "Create a status check in the project's version control system
    #     that runs a Software Composition Analysis tool on all changes to the
    #     codebase. Require that the status check passes before changes can be
    #     merged."
    inferred_status: Met
    confidence: 1

  - si_path: repository.security.tools
    si_condition: has_tool_type_in_ci
    si_value: SCA
    target_criterion: osps_vm_05_03
    # Target:
    #   description: "While active, all changes to the project's codebase MUST
    #     be automatically evaluated against a documented policy for malicious
    #     dependencies and known vulnerabilities in dependencies, then blocked
    #     in the event of violations, except when declared and suppressed as
    #     non-exploitable."
    #   details: "Create a status check in the project's version control system
    #     that runs a Software Composition Analysis tool on all changes to the
    #     codebase. Require that the status check passes before changes can be
    #     merged."
    inferred_status: Met
    confidence: 2

  # repository.security.tools[type=fuzzing]
  # SecurityTool with type "fuzzing".

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: fuzzing
    target_criterion: dynamic_analysis
    # Target:
    #   description: "The project MUST apply at least one dynamic analysis tool
    #     to any proposed major production release of the software produced by
    #     the project before its release."
    inferred_status: Met
    confidence: 2

  # repository.security.tools[type=DAST]
  # SecurityTool with type "DAST" (Dynamic Application Security Testing).

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: DAST
    target_criterion: dynamic_analysis
    # Target:
    #   description: "The project MUST apply at least one dynamic analysis tool
    #     to any proposed major production release of the software produced by
    #     the project before its release."
    inferred_status: Met
    confidence: 2

  # repository.security.tools[type=pentest]
  # SecurityTool with type "pentest" (penetration test).
  # A pentest is a structured security assessment; maps to security_review and
  # osps_sa_03_01 (security assessment before/after release).

  - si_path: repository.security.tools
    si_condition: has_tool_type
    si_value: pentest
