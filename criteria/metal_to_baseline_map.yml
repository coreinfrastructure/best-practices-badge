# criteria/metal_to_baseline_map.yml
#
# Mapping from metal (passing/silver/gold) criteria answers to implied
# OSPS Baseline criteria answers, to enable automation.
#
# To update requirements text run script/update_mapping_comments.rb
#
# Each entry maps one source (metal) criterion to one target (baseline)
# criterion. A single source may appear in multiple entries (one per target);
# a single target may appear in multiple entries (one per source). The
# detective takes the highest-confidence proposal for each target.
#
# source_level: 0 = passing, 1 = silver, 2 = gold
# These are really just to help in finding the criterion and give a notion
# of difficulty. Some criteria have more than 1 source_level and it doesn't
# matter for the criterion itself.
#
# Confidence values (0-3; always < Chief::CONFIDENCE_OVERRIDE of 4):
#   0 = no inference; skip this entry
#   1 = weak signal; worth surfacing but treat with caution
#   2 = moderate confidence; partial or related requirement
#   3 = strong confidence; essentially the same requirement
#
# Three confidence fields per entry, one per possible source status:
#   confidence_met:   inference when source criterion status is "Met"
#   confidence_unmet: inference when source criterion status is "Unmet"
#   confidence_na:    inference when source criterion status is "N/A"
#
# Each field is either:
#   - An integer (0-3): shorthand for a same-status inference.
#       confidence_met: 3    means Met   → Met,   confidence 3
#       confidence_unmet: 2  means Unmet → Unmet, confidence 2
#       confidence_na: 1     means N/A   → N/A,   confidence 1
#   - A [confidence, "TargetStatus"] array: a cross-status inference, where
#     the source status implies a *different* target status.
#       confidence_na: [2, "Unmet"]  means N/A → Unmet, confidence 2
#     Any source/target status combination is valid; in practice the only
#     cross-status case currently present is N/A → Unmet (see below).
#     The Ruby parser should handle both forms:
#       val.is_a?(Array) ? [val[0], val[1]] : [val, same_status_as_source]
#
# Each value encodes BOTH the semantic closeness of the two criteria (mapping
# strength) AND how reliably that particular status transfers.  They cannot
# be separated: a strong mapping with a poorly-transferable status yields the
# same result as a weak mapping with a highly-transferable status.
#
# Notable asymmetries
# -------------------
# The three per-status confidence values for a given entry are often NOT
# symmetric, and intentionally so. Three recurring patterns:
#
# 1. "Necessary but not sufficient" (low Met, high Unmet):
#    Some metal criteria establish a *prerequisite* for a baseline criterion
#    without fully satisfying it.  Met in metal means the prerequisite is in
#    place — useful, but the baseline may require more.  Unmet in metal,
#    however, makes the baseline impossible to satisfy, so Unmet carries much
#    higher confidence.
#    Examples:
#      test -> osps_qa_06_01              (Met:1, Unmet:3)
#      two_person_review -> osps_qa_07_01 (Met:1, Unmet:3)
#      static_analysis -> osps_vm_06_02   (Met:1, Unmet:2)
#      dependency_monitoring -> osps_vm_05_03 (Met:1, Unmet:2)
#
# 2. "Broader scope" (moderate Met, high Unmet):
#    The metal criterion is narrower than the baseline criterion.  Met in
#    metal covers the overlapping portion well, but leaves the broader
#    baseline requirement only partially addressed.  Unmet in metal, however,
#    violates even the narrower requirement and thus makes the baseline
#    requirement very likely also unmet.
#    Examples:
#      no_leaked_credentials -> osps_br_07_01 (Met:2, Unmet:3)
#      repo_track -> osps_qa_01_02            (Met:2, Unmet:3)
#
# 3. "Cross-status" (array form, N/A → Unmet):
#    When metal N/A means the source feature is *absent* and baseline
#    *requires* that feature, the correct inference is N/A → Unmet rather
#    than N/A → N/A.  Use the array form: confidence_na: [n, "Unmet"].
#    Example:
#      vulnerability_report_private -> osps_vm_03_01
#        confidence_na: [2, "Unmet"]
#        (metal N/A = private reporting is absent; baseline requires it)
#
# Key N/A guidance:
#   - When both criteria share the same applicability clause (e.g. "when an
#     official release is created"), N/A transfers at full mapping strength
#     using the plain integer form.
#   - When the applicability clauses differ, N/A confidence is usually 0-1.
#   - When metal N/A implies baseline *Unmet* (not baseline N/A), use the
#     array form: confidence_na: [n, "Unmet"].
#
# HTML is stripped from criterion descriptions in comments below.
# Source descriptions are from config/locales/en.yml (extracted to ,metal.yml).
# Target descriptions are from config/locales/en.yml (extracted to ,baseline.yml).
#
# Entries are grouped by target criterion section for ease of review.

mappings:

  # ---------------------------------------------------------------------------
  # Access Control (osps_ac_*)
  # ---------------------------------------------------------------------------

  - source_criterion: require_2FA
    # source_level: 2
    # Source:
    #   description: "The project MUST require two-factor authentication (2FA)
    #     for developers for changing a central repository or accessing
    #     sensitive data (such as private vulnerability reports). This 2FA
    #     mechanism MAY use mechanisms without cryptographic mechanisms such as
    #     SMS, though that is not recommended."
    target_criterion: osps_ac_01_01
    # Target:
    #   description: "When a user attempts to read or modify a sensitive
    #     resource in the project's authoritative repository, the system MUST
    #     require the user to complete a multi-factor authentication process."
    #   details: "Enforce multi-factor authentication for the project's version
    #     control system, requiring collaborators to provide a second form of
    #     authentication when accessing sensitive data or modifying repository
    #     settings. Passkeys are acceptable for this control."
    confidence_met: 3     # 2FA for developers directly satisfies MFA on sensitive resources
    confidence_unmet: 3   # No 2FA requirement directly means MFA requirement is unmet
    confidence_na: 1      # Applicability conditions differ; metal N/A is unusual here

  # ---------------------------------------------------------------------------
  # Build & Release (osps_br_*)
  # ---------------------------------------------------------------------------

  - source_criterion: version_unique
    # source_level: 0
    # Source:
    #   description: "The project results MUST have a unique version identifier
    #     for each release intended to be used by users."
    #   details: "This MAY be met in a variety of ways including a commit IDs
    #     (such as git commit id or mercurial changeset id) or a version number
    #     (including version numbers that use semantic versioning or date-based
    #     schemes like YYYYMMDD)."
    target_criterion: osps_br_02_01
    # Target:
    #   description: "When an official release is created, that release MUST be
    #     assigned a unique version identifier."
    #   details: "Assign a unique version identifier to each release produced
    #     by the project, following a consistent naming convention or numbering
    #     scheme. Examples include SemVer, CalVer, or git commit id."
    confidence_met: 3     # Unique version identifiers per release directly satisfies this
    confidence_unmet: 3   # No unique identifiers means this requirement is unmet
    confidence_na: 3      # Both apply only when a release is created; N/A transfers strongly

  - source_criterion: version_unique
    # source_level: 0
    # Source:
    #   description: "The project results MUST have a unique version identifier
    #     for each release intended to be used by users."
    #   details: "This MAY be met in a variety of ways including a commit IDs
    #     (such as git commit id or mercurial changeset id) or a version number
    #     (including version numbers that use semantic versioning or date-based
    #     schemes like YYYYMMDD)."
    target_criterion: osps_br_02_02
    # Target:
    #   description: "When an official release is created, all assets within
    #     that release MUST be clearly associated with the release identifier
    #     or another unique identifier for the asset."
    #   details: "Assign a unique version identifier to each software asset
    #     produced by the project, following a consistent naming convention or
    #     numbering scheme. Examples include SemVer, CalVer, or git commit id."
    confidence_met: 2     # Having unique release IDs is necessary but not sufficient;
                          # individual assets may not all be explicitly labeled with the ID
    confidence_unmet: 3   # Without unique IDs, assets cannot be associated with them
    confidence_na: 3      # Same applicability clause as above; N/A transfers strongly

  - source_criterion: sites_https
    # source_level: 0
    # Source:
    #   description: "The project sites (website, repository, and download
    #     URLs) MUST support HTTPS using TLS."
    #   details: "This requires that the project home page URL and the version
    #     control repository URL begin with "https:", not "http:". You can get
    #     free certificates from Let's Encrypt. Projects MAY implement this
    #     criterion using (for example) GitHub pages, GitLab pages, or
    #     SourceForge project pages. If you support HTTP, we urge you to
    #     redirect the HTTP traffic to HTTPS."
    target_criterion: osps_br_03_01
    # Target:
    #   description: "When the project lists a URI as an official project
    #     channel, that URI MUST be exclusively delivered using encrypted
    #     channels."
    #   details: "Configure the project's websites and version control systems
    #     to use encrypted channels such as SSH or HTTPS for data transmission.
    #     Ensure all tools and domains referenced in project documentation can
    #     only be accessed via encrypted channels."
    confidence_met: 3     # HTTPS/TLS directly satisfies the encrypted channel requirement
    confidence_unmet: 3   # No HTTPS means the encrypted channel requirement is unmet
    confidence_na: 2      # Metal N/A (no project sites) aligns well with baseline N/A
                          # (no official URIs to protect), though exact conditions differ

  - source_criterion: delivery_mitm
    # source_level: 0
    # Source:
    #   description: "The project MUST use a delivery mechanism that counters
    #     MITM attacks. Using https or ssh+scp is acceptable."
    #   details: "An even stronger mechanism is releasing the software with
    #     digitally signed packages, since that mitigates attacks on the
    #     distribution system, but this only works if the users can be
    #     confident that the public keys for signatures are correct and if the
    #     users will actually check the signature."
    target_criterion: osps_br_03_02
    # Target:
    #   description: "When the project lists a URI as an official distribution
    #     channel, that channel MUST be protected from adversary-in-the-middle
    #     attacks using cryptographically authenticated channels."
    #   details: "Artifacts distributed by the project should be distributed
    #     through channels which ensure integrity and authenticity. Use of
    #     HTTPS for downloads, signed releases, or distribution through trusted
    #     package managers are all acceptable methods to protect against
    #     adversary-in-the-middle attacks."
    confidence_met: 3     # MITM-resistant delivery directly satisfies this requirement
    confidence_unmet: 3   # No MITM protection means the distribution channel is unprotected
    confidence_na: 2      # Metal N/A (no direct delivery to users) aligns well with no
                          # official distribution channel, though exact conditions differ

  - source_criterion: release_notes
    # source_level: 0
    # Source:
    #   description: "The project MUST provide, in each release, release notes
    #     that are a human-readable summary of major changes in that release to
    #     help users determine if they should upgrade and what the upgrade
    #     impact will be. The release notes MUST NOT be the raw output of a
    #     version control log (e.g., the "git log" command results are not
    #     release notes). Projects whose results are not intended for reuse in
    #     multiple locations (such as the software for a single website or
    #     service) AND employ continuous delivery MAY select "N/A"."
    #   details: "The release notes MAY be implemented in a variety of ways.
    #     Many projects provide them in a file named "NEWS", "CHANGELOG", or
    #     "ChangeLog", optionally with extensions such as ".txt", ".md", or
    #     ".html". Historically the term "change log" meant a log of every
    #     change, but to meet these criteria what is needed is a human-readable
    #     summary. The release notes MAY instead be provided by version control
    #     system mechanisms such as the GitHub Releases workflow."
    target_criterion: osps_br_04_01
    # Target:
    #   description: "When an official release is created, that release MUST
    #     contain a descriptive log of functional and security modifications."
    #   details: "Ensure that all releases include a descriptive change log. It
    #     is recommended to ensure that the change log is human-readable and
    #     includes details beyond commit messages, such as descriptions of the
    #     security impact or relevance to different use cases. To ensure
    #     machine readability, place the content under a markdown header such
    #     as "## Changelog"."
    confidence_met: 3     # Human-readable release notes directly satisfy this requirement
    confidence_unmet: 3   # No release notes means this requirement is unmet
    confidence_na: 2      # Metal N/A (continuous delivery / single service) partially aligns
                          # with baseline N/A (no official releases), but conditions differ
                          # because continuous delivery may still have informal "releases"

  - source_criterion: external_dependencies
    # source_level: 1
    # Source:
    #   description: "The project MUST list external dependencies in a
    #     computer-processable way."
    #   details: "Typically this is done using the conventions of package
    #     manager and/or build system. Note that this helps implement
    #     installation_development_quick."
    target_criterion: osps_br_05_01
    # Target:
    #   description: "When a build and release pipeline ingests dependencies,
    #     it MUST use standardized tooling where available."
    #   details: "Use a common tooling for your ecosystem, such as package
    #     managers or dependency management tools to ingest dependencies at
    #     build time. This may include using a dependency file, lock file, or
    #     manifest to specify the required dependencies, which are then pulled
    #     in by the build system."
    confidence_met: 0     # A machine-readable dependency list might imply standardized
                          # tooling is in use, but it's too disconnected
    confidence_unmet: 2   # No machine-readable list suggests non-standard or manual approach
    confidence_na: 2      # Metal N/A (no package manager convention) aligns well with
                          # baseline N/A (no standardized tooling available)

  - source_criterion: signed_releases
    # source_level: 1
    # Source:
    #   description: "The project MUST cryptographically sign releases of the
    #     project results intended for widespread use, and there MUST be a
    #     documented process explaining to users how they can obtain the public
    #     signing keys and verify the signature(s). The private key for these
    #     signature(s) MUST NOT be on site(s) used to directly distribute the
    #     software to the public. If releases are not intended for widespread
    #     use, select "not applicable" (N/A)."
    #   details: "The project results include both source code and any
    #     generated deliverables where applicable (e.g., executables, packages,
    #     and containers). Generated deliverables MAY be signed separately from
    #     source code. These MAY be implemented as signed git tags (using
    #     cryptographic digital signatures). Projects MAY provide generated
    #     results separately from tools like git, but in those cases, the
    #     separate results MUST be separately signed."
    target_criterion: osps_br_06_01
    # Target:
    #   description: "When an official release is created, that release MUST be
    #     signed or accounted for in a signed manifest including each asset's
    #     cryptographic hashes."
    #   details: "Sign all released software assets at build time with a
    #     cryptographic signature or attestations, such as GPG or PGP
    #     signature, Sigstore signatures, SLSA provenance, or SLSA VSAs.
    #     Include the cryptographic hashes of each asset in a signed manifest
    #     or metadata file."
    confidence_met: 3     # Cryptographic signing of releases directly satisfies this
    confidence_unmet: 2   # Unsigned releases likely means this is unmet; however, a signed
                          # manifest (without individual release signing) could still satisfy
                          # baseline even if metal is Unmet for a different reason
    confidence_na: 1      # Metal N/A = "not for widespread use"; baseline applies to any
                          # official release regardless of distribution intent; conditions differ

  - source_criterion: no_leaked_credentials
    # source_level: 0
    # Source:
    #   description: "The public repositories MUST NOT leak a valid private
    #     credential (e.g., a working password or private key) that is intended
    #     to limit public access."
    #   details: "A project MAY leak "sample" credentials for testing and
    #     unimportant databases, as long as they are not intended to limit
    #     public access."
    target_criterion: osps_br_07_01
    # Target:
    #   description: "The project MUST prevent the unintentional storage of
    #     unencrypted sensitive data, such as secrets and credentials, in the
    #     version control system."
    #   details: "Configure .gitignore or equivalent to exclude files that may
    #     contain sensitive information. Use pre-commit hooks and automated
    #     scanning tools to detect and prevent the inclusion of sensitive data
    #     in commits."
    confidence_met: 2     # No leaked valid credentials satisfies the credential aspect;
                          # baseline is broader (all sensitive data, not just valid credentials)
    confidence_unmet: 3   # Leaked valid credentials is a direct and serious violation of this
    confidence_na: 0      # Metal N/A is unusual; no clear applicability overlap

  # ---------------------------------------------------------------------------
  # Documentation (osps_do_*)
  # ---------------------------------------------------------------------------

  - source_criterion: documentation_basics
    # source_level: 0
    # Source:
    #   description: "The project MUST provide basic documentation for the
    #     software produced by the project."
    #   details: "This documentation must be in some media (such as text or
    #     video) that includes: how to install it, how to start it, how to use
    #     it (possibly with a tutorial using examples), and how to use it
    #     securely (e.g., what to do and what not to do) if that is an
    #     appropriate topic for the software. The security documentation need
    #     not be long. The project MAY use hypertext links to non-project
    #     material as documentation. If the project does not produce software,
    #     choose "not applicable" (N/A)."
    target_criterion: osps_do_01_01
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST include user guides for all basic functionality."
    #   details: "Create user guides or documentation for all basic
    #     functionality of the project, explaining how to install, configure,
    #     and use the project's features. If there are any known dangerous or
    #     destructive actions available, include highly-visible warnings."
    confidence_met: 2     # Basic documentation likely covers user guides, but metal does not
                          # require coverage of *all* basic functionality explicitly
    confidence_unmet: 2   # No basic documentation means user guides are absent
    confidence_na: 2      # Metal N/A (no software produced) strongly implies no releases,
                          # aligning well with baseline N/A; conditions differ slightly

  - source_criterion: report_process
    # source_level: 0
    # Source:
    #   description: "The project MUST provide a process for users to submit
    #     bug reports (e.g., using an issue tracker or a mailing list)."
    target_criterion: osps_do_02_01
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST include a guide for reporting defects."
    #   details: "It is recommended that projects use their VCS default issue
    #     tracker. If an external source is used, ensure that the project
    #     documentation and contributing guide clearly and visibly explain how
    #     to use the reporting system. It is recommended that project
    #     documentation also sets expectations for how defects will be triaged
    #     and resolved."
    confidence_met: 3     # A publicly documented bug report process directly satisfies this
    confidence_unmet: 3   # No public bug report process means no guide for reporting defects
    confidence_na: 2      # Applicability conditions differ; metal N/A is unusual here

  - source_criterion: signed_releases
    # source_level: 1
    # Source:
    #   description: "The project MUST cryptographically sign releases of the
    #     project results intended for widespread use, and there MUST be a
    #     documented process explaining to users how they can obtain the public
    #     signing keys and verify the signature(s). The private key for these
    #     signature(s) MUST NOT be on site(s) used to directly distribute the
    #     software to the public. If releases are not intended for widespread
    #     use, select "not applicable" (N/A)."
    #   details: "The project results include both source code and any
    #     generated deliverables where applicable (e.g., executables, packages,
    #     and containers). Generated deliverables MAY be signed separately from
    #     source code. These MAY be implemented as signed git tags (using
    #     cryptographic digital signatures). Projects MAY provide generated
    #     results separately from tools like git, but in those cases, the
    #     separate results MUST be separately signed."
    # description: >-
    #   The project MUST cryptographically sign releases of
    #   the project results intended for widespread use, and
    #   there MUST be a documented process explaining to users
    #   how they can obtain the public signing keys and verify
    #   the signature(s). The private key for these signature(s)
    #   MUST NOT be on site(s) used to directly distribute the
    #   software to the public. If releases are not intended
    #   for widespread use, select "not applicable" (N/A).
    # details: >-
    #   The project results include both source code and any
    #   generated deliverables where applicable (e.g., executables,
    #   packages, and containers). Generated deliverables MAY
    #   be signed separately from source code. These MAY be
    #   implemented as signed git tags (using cryptographic
    #   digital signatures). Projects MAY provide generated
    #   results separately from tools like git, but in those
    #   cases, the separate results MUST be separately signed.
    target_criterion: osps_do_03_01
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST contain instructions to verify the integrity and
    #     authenticity of the release assets."
    #   details: "Instructions in the project should contain information about
    #     the technology used, the commands to run, and the expected output.
    #     When possible, avoid storing this documentation in the same location
    #     as the build and release pipeline to avoid a single breach
    #     compromising both the software and the documentation for verifying
    #     the integrity of the software."
    confidence_met: 3     # Metal explicitly requires a documented verification process,
                          # directly satisfying this requirement
    confidence_unmet: 2   # Unsigned releases make verification instructions less likely,
                          # but separate integrity documentation could still exist
    confidence_na: 2      # Metal N/A = not for widespread use; baseline applies to any
                          # release; applicability conditions differ

  - source_criterion: signed_releases
    # source_level: 1
    # Source:
    #   description: "The project MUST cryptographically sign releases of the
    #     project results intended for widespread use, and there MUST be a
    #     documented process explaining to users how they can obtain the public
    #     signing keys and verify the signature(s). The private key for these
    #     signature(s) MUST NOT be on site(s) used to directly distribute the
    #     software to the public. If releases are not intended for widespread
    #     use, select "not applicable" (N/A)."
    #   details: "The project results include both source code and any
    #     generated deliverables where applicable (e.g., executables, packages,
    #     and containers). Generated deliverables MAY be signed separately from
    #     source code. These MAY be implemented as signed git tags (using
    #     cryptographic digital signatures). Projects MAY provide generated
    #     results separately from tools like git, but in those cases, the
    #     separate results MUST be separately signed."
    target_criterion: osps_do_03_02
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST contain instructions to verify the expected
    #     identity of the person or process authoring the software release."
    #   details: "The expected identity may be in the form of key IDs used to
    #     sign, issuer and identity from a sigstore certificate, or other
    #     similar forms. When possible, avoid storing this documentation in the
    #     same location as the build and release pipeline to avoid a single
    #     breach compromising both the software and the documentation for
    #     verifying the integrity of the software."
    confidence_met: 3     # Documenting how to obtain public signing keys and verify
                          # signatures covers identity verification of the release author
    confidence_unmet: 3   # Unsigned releases make identity verification instructions less likely
    confidence_na: 2      # Same reasoning as osps_do_03_01 above

  # maintenance_or_update -> osps_do_04_01 and osps_do_05_01 intentionally omitted.
  # The mapping is too tenuous: "maintain or document upgrade path" does not
  # reliably imply "document support scope/duration per release" or
  # "document when security updates end."  All confidences would be 0.
  # Kept as a comment to prevent re-adding these entries inadvertently.

  - source_criterion: external_dependencies
    # source_level: 1
    # Source:
    #   description: "The project MUST list external dependencies in a
    #     computer-processable way."
    #   details: "Typically this is done using the conventions of package
    #     manager and/or build system. Note that this helps implement
    #     installation_development_quick."
    target_criterion: osps_do_06_01
    # Target:
    #   description: "When the project has made a release, the project
    #     documentation MUST include a description of how the project selects,
    #     obtains, and tracks its dependencies."
    #   details: "It is recommended to publish this information alongside the
    #     project's technical & design documentation on a publicly viewable
    #     resource such as the source code repository, project website, or
    #     other channel."
    confidence_met: 0     # Having a dependency list does not imply the selection and
                          # tracking *process* is documented; too indirect
    confidence_unmet: 0   # No dependency list says nothing about process documentation
    confidence_na: 2      # Metal N/A (no releases or dependencies) reasonably aligns with baseline
                          # N/A (no releases / no dependency process to document)

  - source_criterion: installation_development_quick
    # source_level: 1
    # Source:
    #   description: "The project MUST provide a way for potential developers
    #     to quickly install all the project results and support environment
    #     necessary to make changes, including the tests and test environment.
    #     This MUST be performed with a commonly-used convention."
    #   details: "This MAY be implemented using a generated container and/or
    #     installation script(s). External dependencies would typically be
    #     installed by invoking system and/or language package manager(s), per
    #     external_dependencies."
    target_criterion: osps_do_07_01
    # Target:
    #   description: "The project documentation MUST include instructions on
    #     how to build the software, including required libraries, frameworks,
    #     SDKs, and dependencies."
    #   details: "It is recommended to publish this information alongside the
    #     project's contributor documentation, such as in CONTRIBUTING.md or
    #     other developer task documentation. This may also be documented using
    #     Makefile targets or other automation scripts."
    confidence_met: 0     # Quick developer install implicitly requires build instructions
                          # and dependency information; some overlap with baseline requirement
    confidence_unmet: 1   # No developer installation path weakly suggests no build docs
    confidence_na: 0      # Metal N/A is unusual here; applicability conditions differ

  # ---------------------------------------------------------------------------
  # Governance (osps_gv_*)
  # ---------------------------------------------------------------------------

  - source_criterion: discussion
    # source_level: 0
    # Source:
    #   description: "The project MUST have one or more mechanisms for
    #     discussion (including proposed changes and issues) that are
    #     searchable, allow messages and topics to be addressed by URL, enable
    #     new people to participate in some of the discussions, and do not
    #     require client-side installation of proprietary software."
    #   details: "Examples of acceptable mechanisms include archived mailing
    #     list(s), GitHub issue and pull request discussions, Bugzilla, Mantis,
    #     and Trac. Asynchronous discussion mechanisms (like IRC) are
    #     acceptable if they meet these criteria; make sure there is a
    #     URL-addressable archiving mechanism. Proprietary JavaScript, while
    #     discouraged, is permitted."
    target_criterion: osps_gv_02_01
    # Target:
    #   description: "While active, the project MUST have one or more
    #     mechanisms for public discussions about proposed changes and usage
    #     obstacles."
    #   details: "Establish one or more mechanisms for public discussions
