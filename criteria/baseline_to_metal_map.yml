# criteria/baseline_to_metal_map.yml
#
# Mapping from OSPS Baseline criteria answers to implied metal
# (passing/silver/gold) criteria answers, to enable automation.
#
# Each entry maps one source (baseline) criterion to one target (metal)
# criterion. A single source may appear in multiple entries (one per target);
# a single target may appear in multiple entries (one per source). The
# detective takes the highest-confidence proposal for each target.
#
# source_level: 1 = baseline-1 (foundational), 2 = baseline-2 (intermediate),
#               3 = baseline-3 (advanced)
# These are provided to help locate the criterion in the source specification;
# they have no effect on detective logic.
#
# target_level: 0 = passing, 1 = silver, 2 = gold
# These are provided to help locate the criterion and give a notion of
# difficulty; they have no effect on detective logic.
#
# Confidence values (0-3; always < Chief::CONFIDENCE_OVERRIDE of 4):
#   0 = no inference; skip this entry
#   1 = weak signal; worth surfacing but treat with caution
#   2 = moderate confidence; partial or related requirement
#   3 = strong confidence; essentially the same requirement
#
# Three confidence fields per entry, one per possible source status:
#   confidence_met:   inference when source criterion status is "Met"
#   confidence_unmet: inference when source criterion status is "Unmet"
#   confidence_na:    inference when source criterion status is "N/A"
#
# Each field is either:
#   - An integer (0-3): shorthand for a same-status inference.
#       confidence_met: 3    means Met   → Met,   confidence 3
#       confidence_unmet: 2  means Unmet → Unmet, confidence 2
#       confidence_na: 1     means N/A   → N/A,   confidence 1
#   - A [confidence, "TargetStatus"] array: a cross-status inference, where
#     the source status implies a *different* target status.
#
# Notable asymmetries
# -------------------
# The three per-status confidence values for a given entry are often NOT
# symmetric, and intentionally so. Three recurring patterns:
#
# 1. "More demanding source, less demanding target" (high Met → Met):
#    When the baseline criterion is MORE demanding than the metal criterion,
#    satisfying baseline Met strongly implies metal Met — the harder requirement
#    being met guarantees the easier one.  Similarly, baseline Unmet means the
#    easier metal requirement is also likely unmet.
#    Examples:
#      osps_qa_07_01 -> two_person_review (Met:3, Unmet:3)
#        (baseline: 100% of commits require non-author approval ≥ metal: 40%)
#      osps_le_03_01 -> license_location  (Met:3, Unmet:3)
#
# 2. "Necessary but not sufficient" (moderate Met, low-or-moderate Unmet):
#    When the baseline criterion partially overlaps with the metal criterion
#    but doesn't fully satisfy it, Met in baseline is useful evidence but
#    does not guarantee Met in metal.  Unmet in baseline sometimes implies
#    Unmet in metal (the baseline is a prerequisite), and sometimes doesn't
#    (the metal requires something entirely different).
#    Examples:
#      osps_br_06_01 -> signed_releases  (Met:2, Unmet:2)
#      osps_sa_03_01 -> assurance_case   (Met:2, Unmet:2)
#
# 3. "Broader scope in baseline" (moderate Met, high Unmet):
#    When the baseline criterion covers a broader scope than the metal
#    criterion.  Unmet in baseline means even the broader requirement failed,
#    making the narrower metal requirement likely unmet too.
#    Examples:
#      osps_gv_02_01 -> discussion       (Met:2, Unmet:3)
#      osps_vm_01_01 -> vulnerability_report_process (Met:2, Unmet:3)
#
# Key N/A guidance:
#   - When both criteria share the same applicability clause (e.g. "when an
#     official release is created"), N/A transfers at full mapping strength
#     using the plain integer form.
#   - When the applicability clauses differ, N/A confidence is usually 0-1.
#   - When baseline N/A implies metal *Unmet* (not metal N/A), use the
#     array form: confidence_na: [n, "Unmet"].
#
# HTML is stripped from criterion descriptions in comments below.
# Source descriptions are from OSPS Baseline specification (extracted to
# ,baseline.yml).
# Target descriptions are from config/locales/en.yml (extracted to
# ,metal.yml).
#
# Entries are grouped by source criterion section for ease of review.

mappings:

  # ---------------------------------------------------------------------------
  # Access Control (osps_ac_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_ac_01_01
    # source_level: 1
    # Source: "When a user attempts to read or modify a sensitive resource in
    #   the project's authoritative repository, the system MUST require the
    #   user to complete a multi-factor authentication process."
    target_criterion: require_2FA
    # target_level: 2
    # Target: "The project MUST require two-factor authentication (2FA) for
    #   developers for changing a central repository or accessing sensitive
    #   data (such as private vulnerability reports)."
    confidence_met: 3     # MFA on sensitive repo access directly satisfies 2FA requirement
    confidence_unmet: 3   # No MFA means the 2FA requirement is clearly unmet
    confidence_na: 1      # Applicability conditions differ; N/A is unusual in metal for 2FA

  - source_criterion: osps_ac_03_01
    # source_level: 1
    # Source: "When a direct commit is attempted on the project's primary
    #   branch, an enforcement mechanism MUST prevent the change from being
    #   applied."
    target_criterion: two_person_review
    # target_level: 2
    # Target: "The project MUST have at least 50% of all proposed
    #   modifications reviewed before release by a person other than the
    #   author, to determine if it is a worthwhile modification and free of
    #   known issues which would argue against its inclusion."
    confidence_met: 1     # Blocking direct commits forces PR workflow — a prerequisite for
                          # enforced review, but doesn't itself require a non-author review
    confidence_unmet: 2   # If direct commits are allowed, enforced 50% review is very unlikely
    confidence_na: 0      # Applicability clauses differ too much for N/A to transfer

  # ---------------------------------------------------------------------------
  # Build & Release (osps_br_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_br_02_01
    # source_level: 2
    # Source: "When an official release is created, that release MUST be
    #   assigned a unique version identifier."
    target_criterion: version_unique
    # target_level: 0
    # Target: "The project results MUST have a unique version identifier for
    #   each release intended to be used by users."
    confidence_met: 3     # Unique version identifier per release directly satisfies this requirement
    confidence_unmet: 3   # No unique version identifier means this metal requirement is unmet
    confidence_na: 3      # Both criteria apply only when a release is created; N/A transfers strongly

  - source_criterion: osps_br_02_02
    # source_level: 3
    # Source: "When an official release is created, all assets within that
    #   release MUST be clearly associated with the release identifier or
    #   another unique identifier for the asset."
    target_criterion: version_unique
    # target_level: 0
    # Target: "The project results MUST have a unique version identifier for
    #   each release intended to be used by users."
    confidence_met: 2     # Associating assets with a release ID implies a unique release ID exists,
                          # but the baseline asset-labeling requirement is more granular
    confidence_unmet: 2   # No asset association implies unique release IDs may also be absent
    confidence_na: 3      # Both apply only when a release is created; N/A transfers strongly

  - source_criterion: osps_br_03_01
    # source_level: 1
    # Source: "When the project lists a URI as an official project channel,
    #   that URI MUST be exclusively delivered using encrypted channels."
    target_criterion: sites_https
    # target_level: 0
    # Target: "The project sites (website, repository, and download URLs)
    #   MUST support HTTPS using TLS."
    confidence_met: 3     # Encrypted-channel URIs directly satisfies the HTTPS/TLS requirement
    confidence_unmet: 3   # No encrypted channels means the HTTPS requirement is unmet
    confidence_na: 2      # Baseline N/A (no official URIs) roughly aligns with metal N/A
                          # (no project sites), though exact conditions differ slightly

  - source_criterion: osps_br_03_02
    # source_level: 1
    # Source: "When the project lists a URI as an official distribution
    #   channel, that channel MUST be protected from adversary-in-the-middle
    #   attacks using cryptographically authenticated channels."
    target_criterion: delivery_mitm
    # target_level: 0
    # Target: "The project MUST use a delivery mechanism that counters MITM
    #   attacks. Using https or ssh+scp is acceptable."
    confidence_met: 3     # Authenticated distribution channels directly satisfies MITM protection
    confidence_unmet: 3   # No MITM protection on distribution channel means metal is also unmet
    confidence_na: 2      # Baseline N/A (no distribution URI) aligns well with no deliveries
                          # requiring MITM protection, though exact applicability differs

  - source_criterion: osps_br_04_01
    # source_level: 2
    # Source: "When an official release is created, that release MUST contain
    #   a descriptive log of functional and security modifications."
    target_criterion: release_notes
    # target_level: 0
    # Target: "The project MUST provide, in each release, release notes that
    #   are a human-readable summary of major changes in that release to help
    #   users determine if they should upgrade and what the upgrade impact
    #   will be. The release notes MUST NOT be the raw output of a VCS log."
    confidence_met: 3     # A descriptive modification log satisfies the release notes requirement
    confidence_unmet: 3   # No modification log means the release notes requirement is also unmet
    confidence_na: 2      # Both apply when a release is created; applicability is very similar
                          # though metal also allows N/A for continuous-delivery services

  - source_criterion: osps_br_05_01
    # source_level: 2
    # Source: "When a build and release pipeline ingests dependencies, it
    #   MUST use standardized tooling where available."
    target_criterion: external_dependencies
    # target_level: 1
    # Target: "The project MUST list external dependencies in a
    #   computer-processable way."
    confidence_met: 3     # Using standardized dependency tooling typically produces a
                          # computer-processable dependency list
    confidence_unmet: 1   # Not using standardized tooling is weak evidence against a
                          # machine-readable list (manual lists are still possible)
    confidence_na: 3      # Both apply only when a build pipeline ingests dependencies;
                          # N/A transfers strongly when no dependencies exist

  - source_criterion: osps_br_06_01
    # source_level: 2
    # Source: "When an official release is created, that release MUST be
    #   signed or accounted for in a signed manifest including each asset's
    #   cryptographic hashes."
    target_criterion: signed_releases
    # target_level: 1
    # Target: "The project MUST cryptographically sign releases of the
    #   project results intended for widespread use, and there MUST be a
    #   documented process explaining to users how to obtain the public
    #   signing key and verify the signature."
    confidence_met: 2     # Baseline requires a signature OR signed manifest; metal requires a
                          # signature with documented key/verification process — partial overlap
    confidence_unmet: 2   # No signature or signed manifest makes metal's signed_releases unmet
    confidence_na: 1      # Baseline N/A (no official releases) partially aligns with metal N/A,
                          # but metal N/A is less common for established projects

  - source_criterion: osps_br_06_01
    # source_level: 2
    # Source: "When an official release is created, that release MUST be
    #   signed or accounted for in a signed manifest including each asset's
    #   cryptographic hashes."
    target_criterion: delivery_mitm
    # target_level: 0
    # Target: "The project MUST use a delivery mechanism that counters MITM
    #   attacks. Using https or ssh+scp is acceptable."
    confidence_met: 2     # Cryptographic signatures on releases provide MITM protection for
                          # release artifacts, though this differs from authenticated transport
    confidence_unmet: 1   # No signature or signed manifest is weak evidence of MITM risk
    confidence_na: 0      # Applicability conditions differ too much for N/A to transfer

  - source_criterion: osps_br_07_01
    # source_level: 1
    # Source: "The project MUST prevent the unintentional storage of
    #   unencrypted sensitive data, such as secrets and credentials, in the
    #   version control system."
    target_criterion: no_leaked_credentials
    # target_level: 0
    # Target: "The public repositories MUST NOT leak a valid private
    #   credential (e.g., a working password or private key) that is
    #   intended to limit public access."
    confidence_met: 3     # Preventing credential storage in VCS directly satisfies the
                          # no-leaked-credentials requirement
    confidence_unmet: 3   # Allowing credential storage in VCS means leakage is very likely
    confidence_na: 0      # N/A applicability is too different to transfer

  - source_criterion: osps_br_07_02
    # source_level: 3
    # Source: "The project MUST define a policy for managing secrets and
    #   credentials used by the project. The policy should include guidelines
    #   for storing, accessing, and rotating secrets and credentials."
    target_criterion: no_leaked_credentials
    # target_level: 0
    # Target: "The public repositories MUST NOT leak a valid private
    #   credential (e.g., a working password or private key) that is
    #   intended to limit public access."
    confidence_met: 2     # A credential management policy reduces leakage risk, but a policy
                          # alone does not guarantee credentials are never exposed
    confidence_unmet: 1   # No credential management policy doesn't mean credentials are leaked;
                          # informal good practices may still prevent leakage
    confidence_na: 0      # N/A applicability is too different to transfer

  # ---------------------------------------------------------------------------
  # Documentation (osps_do_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_do_01_01
    # source_level: 1
    # Source: "When the project has made a release, the project documentation
    #   MUST include user guides for all basic functionality."
    target_criterion: documentation_basics
    # target_level: 0
    # Target: "The project MUST provide basic documentation for the software
    #   produced by the project."
    confidence_met: 3     # User guides for all basic functionality directly satisfies the
                          # basic documentation requirement
    confidence_unmet: 3   # No basic functionality guides means basic documentation is absent
    confidence_na: 2      # Both apply when a release is made; N/A transfers at partial strength

  - source_criterion: osps_do_02_01
    # source_level: 1
    # Source: "When the project has made a release, the project documentation
    #   MUST include a guide for reporting defects."
    target_criterion: report_process
    # target_level: 0
    # Target: "The project MUST provide a process for users to submit bug
    #   reports (e.g., using an issue tracker or a mailing list)."
    confidence_met: 3     # A guide for reporting defects directly satisfies the bug-reporting
                          # process requirement
    confidence_unmet: 3   # No defect-reporting guide means the bug-report process is absent
    confidence_na: 2      # Both apply when a release is made; N/A transfers at partial strength

  - source_criterion: osps_do_03_01
    # source_level: 3
    # Source: "When the project has made a release, the project documentation
    #   MUST contain instructions to verify the integrity and authenticity of
    #   the release assets."
    target_criterion: signed_releases
    # target_level: 1
    # Target: "The project MUST cryptographically sign releases of the
    #   project results intended for widespread use, and there MUST be a
    #   documented process explaining to users how to obtain the public
    #   signing key and verify the signature."
    confidence_met: 2     # Instructions to verify integrity and authenticity imply signatures
                          # exist, but don't directly confirm a signing+verification process
    confidence_unmet: 2   # No verification instructions makes the documented process
                          # sub-requirement of signed_releases unmet
    confidence_na: 2      # Both apply when a release is made for widespread use

  - source_criterion: osps_do_03_02
    # source_level: 3
    # Source: "When the project has made a release, the project documentation
    #   MUST contain instructions to verify the expected identity of the person
    #   or process authoring the software release."
    target_criterion: signed_releases
    # target_level: 1
    # Target: "The project MUST cryptographically sign releases of the
    #   project results intended for widespread use, and there MUST be a
    #   documented process explaining to users how to obtain the public
    #   signing key and verify the signature."
    confidence_met: 3     # Instructions to verify the release author's identity directly
                          # satisfies the "documented process for verifying signatures" requirement
    confidence_unmet: 2   # No identity-verification instructions makes the documented-process
                          # sub-requirement unmet; signing itself may still exist
    confidence_na: 2      # Both apply when a release is made for widespread use

  - source_criterion: osps_do_06_01
    # source_level: 2
    # Source: "When the project has made a release, the project documentation
    #   MUST include a description of how the project selects, obtains, and
    #   tracks its dependencies."
    target_criterion: external_dependencies
    # target_level: 1
    # Target: "The project MUST list external dependencies in a
    #   computer-processable way."
    confidence_met: 2     # Documenting how dependencies are selected and tracked implies they
                          # are listed, but docs may not themselves be computer-processable
    confidence_unmet: 1   # No dependency tracking description doesn't mean a machine-readable
                          # list is absent (it may exist separately from docs)
    confidence_na: 2      # Both may be N/A when a project has no external dependencies

  - source_criterion: osps_do_07_01
    # source_level: 2
    # Source: "The project documentation MUST include instructions on how to
    #   build the software, including required libraries, frameworks, SDKs,
    #   and dependencies."
    target_criterion: installation_development_quick
    # target_level: 1
    # Target: "The project MUST provide a way for potential developers to
    #   quickly install all the project results and support environment
    #   necessary to make changes, including the tests and test environment.
    #   This MUST be performed with a commonly-used convention."
    confidence_met: 2     # Build instructions with library/SDK dependencies directly overlap
                          # with the developer-setup requirement; both are developer-facing
                          # documentation for getting the project running locally
    confidence_unmet: 0   # Absence of build instructions doesn't imply absence of dev-setup docs
    confidence_na: 0      # Applicability conditions differ; N/A doesn't transfer reliably

  # ---------------------------------------------------------------------------
  # Governance (osps_gv_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_gv_01_01
    # source_level: 2
    # Source: "While active, the project documentation MUST include a list
    #   of project members with access to sensitive resources."
    target_criterion: roles_responsibilities
    # target_level: 1
    # Target: "The project MUST clearly define and publicly document the key
    #   roles in the project and their responsibilities, including any tasks
    #   those roles must perform."
    confidence_met: 1     # Listing members with sensitive access is a minimal form of role
                          # documentation, but doesn't cover responsibilities or task definitions
    confidence_unmet: 2   # No documentation of sensitive-access members suggests no broader
                          # roles/responsibilities documentation exists
    confidence_na: 1      # Applicability is similar but not identical; partial N/A transfer

  - source_criterion: osps_gv_01_02
    # source_level: 2
    # Source: "While active, the project documentation MUST include
    #   descriptions of the roles and responsibilities for members of the
    #   project."
    target_criterion: roles_responsibilities
    # target_level: 1
    # Target: "The project MUST clearly define and publicly document the key
    #   roles in the project and their responsibilities, including any tasks
    #   those roles must perform."
    confidence_met: 3     # Documented roles and responsibilities for members directly satisfies
                          # the metal requirement to define and document key roles
    confidence_unmet: 3   # No roles/responsibilities documentation means the metal requirement
                          # is also unmet
    confidence_na: 2      # Both may be N/A for single-person projects with no formal roles

  - source_criterion: osps_gv_02_01
    # source_level: 1
    # Source: "While active, the project MUST have one or more mechanisms for
    #   public discussions about proposed changes and usage obstacles."
    target_criterion: discussion
    # target_level: 0
    # Target: "The project MUST have one or more mechanisms for discussion
    #   (including proposed changes and issues) that are searchable,
    #   allow messages and topics to be addressed by URL, enable new
    #   people to participate in some of the discussions, and do not
    #   require client-side installation of proprietary software."
    confidence_met: 2     # Baseline requires public discussions; metal adds searchability,
                          # URL-addressability, and no-proprietary-software requirements
    confidence_unmet: 3   # No public discussions directly means the metal requirement is unmet
    confidence_na: 2      # Both may be N/A when the project has no external users/contributors

  - source_criterion: osps_gv_03_01
    # source_level: 1
    # Source: "While active, the project documentation MUST include an
    #   explanation of the contribution process."
    target_criterion: contribution
    # target_level: 0
    # Target: "The information on how to contribute MUST explain the
    #   contribution process (e.g., are pull requests used?)."
    confidence_met: 3     # An explanation of the contribution process directly satisfies the
                          # metal requirement to explain how to contribute
    confidence_unmet: 3   # No contribution process explanation means the metal requirement
                          # is also unmet
    confidence_na: 0      # Neither criterion commonly allows N/A for established projects

  - source_criterion: osps_gv_03_02
    # source_level: 2
    # Source: "While active, the project documentation MUST include a guide
    #   for code contributors that includes requirements for acceptable
    #   contributions."
    target_criterion: contribution_requirements
    # target_level: 1
    # Target: "The information on how to contribute SHOULD include
    #   the requirements for acceptable contributions (e.g., a reference
    #   to any required coding standard)."
    confidence_met: 3     # A contributor guide with acceptance requirements directly satisfies
                          # the metal requirement to document contribution requirements
    confidence_unmet: 3   # No acceptance requirements guide means the metal requirement is unmet
    confidence_na: 2      # Both may be N/A for projects that accept all contributions without
                          # formal requirements

  # ---------------------------------------------------------------------------
  # Legal (osps_le_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_le_01_01
    # source_level: 2
    # Source: "While active, the version control system MUST require all code
    #   contributors to assert that they are legally authorized to make the
    #   associated contributions on every commit."
    target_criterion: dco
    # target_level: 1
    # Target: "The project SHOULD have a legal mechanism where all developers
    #   of non-trivial amounts of project software assert that they are
    #   legally authorized to make these contributions."
    confidence_met: 3     # VCS-enforced contributor authorization assertions IS the DCO
                          # mechanism; the baseline requires exactly what the metal SHOULD requires
    confidence_unmet: 2   # No contributor authorization requirement makes a DCO unlikely,
                          # but the metal criterion is SHOULD (not MUST)
    confidence_na: 0      # Applicability conditions are too different for N/A to transfer

  - source_criterion: osps_le_02_01
    # source_level: 1
    # Source: "While active, the license for the source code MUST meet the
    #   OSI Open Source Definition or the FSF Free Software Definition."
    target_criterion: floss_license
    # target_level: 0
    # Target: "The software produced by the project MUST be released
    #   as FLOSS."
    confidence_met: 3     # OSI- or FSF-approved source license directly satisfies the metal
                          # FLOSS license requirement
    confidence_unmet: 3   # Not using an OSI/FSF-approved license means the metal requirement
                          # is unmet
    confidence_na: 0      # Both criteria require a license; N/A is not applicable here

  - source_criterion: osps_le_02_01
    # source_level: 1
    # Source: "While active, the license for the source code MUST meet the
    #   OSI Open Source Definition or the FSF Free Software Definition."
    target_criterion: floss_license_osi
    # target_level: 0
    # Target: "It is SUGGESTED that any required license(s) for the software
    #   produced by the project be approved by the OSI."
    confidence_met: 2     # An OSI-approved source license satisfies this SUGGESTED metal
                          # criterion; FSF-only licenses satisfy baseline but not this suggestion
    confidence_unmet: 2   # Not OSI/FSF-approved means the suggested OSI-only criterion is unmet
    confidence_na: 0      # N/A is not applicable; projects must have a license

  - source_criterion: osps_le_02_02
    # source_level: 1
    # Source: "While active, the license for the released software assets
    #   MUST meet the OSI Open Source Definition or the FSF Free Software
    #   Definition."
    target_criterion: floss_license
    # target_level: 0
    # Target: "The software produced by the project MUST be released
    #   as FLOSS."
    confidence_met: 3     # OSI- or FSF-approved release license directly satisfies the metal
                          # FLOSS license requirement
    confidence_unmet: 3   # Not using an OSI/FSF-approved license means the metal requirement
                          # is unmet
    confidence_na: 0      # N/A is not applicable; projects must have a license

  - source_criterion: osps_le_03_01
    # source_level: 1
    # Source: "While active, the license for the source code MUST be
    #   maintained in the corresponding repository's LICENSE file, COPYING
    #   file, or LICENSE/ directory."
    target_criterion: license_location
    # target_level: 0
    # Target: "The project MUST post the license(s) of its results in a
    #   standard location in their source repository."
    confidence_met: 3     # License in LICENSE/COPYING file or LICENSE/ directory directly
                          # satisfies the metal standard-location requirement
    confidence_unmet: 3   # No license in standard location means the metal requirement is unmet
    confidence_na: 0      # N/A is not applicable; projects must post their license

  - source_criterion: osps_le_03_02
    # source_level: 1
    # Source: "While active, the license for the released software assets
    #   MUST be included in the released source code, or in a LICENSE file,
    #   COPYING file, or LICENSE/ directory alongside the corresponding
    #   release assets."
    target_criterion: license_location
    # target_level: 0
    # Target: "The project MUST post the license(s) of its results in a
    #   standard location in their source repository."
    confidence_met: 2     # Including the release-asset license in standard locations is related
                          # to but distinct from the source-repo license location requirement
    confidence_unmet: 3   # No license alongside release assets strongly suggests the standard-
                          # location source requirement is also not met
    confidence_na: 0      # N/A is not applicable; projects must post their license

  # ---------------------------------------------------------------------------
  # Quality Assurance (osps_qa_*)
  # ---------------------------------------------------------------------------

  - source_criterion: osps_qa_01_01
    # source_level: 1
    # Source: "While active, the project's source code repository MUST be
    #   publicly readable at a static URL."
    target_criterion: repo_public
    # target_level: 0
    # Target: "The project MUST have a version-controlled source repository
    #   that is publicly readable and has a URL."
    confidence_met: 3     # Publicly readable source at a static URL directly satisfies the
                          # metal public repository requirement
    confidence_unmet: 3   # Non-public source code means the metal requirement is also unmet
    confidence_na: 0      # Both criteria require public access; N/A is not applicable here

  - source_criterion: osps_qa_01_02
    # source_level: 1
    # Source: "The version control system MUST contain a publicly readable
    #   record of all changes made, who made the changes, and when the
    #   changes were made."
    target_criterion: repo_track
    # target_level: 0
    # Target: "The project's source repository MUST track what changes
    #   were made, who made the changes, and when the changes were made."
    confidence_met: 3     # A public record of all changes, authors, and dates IS a
                          # change-tracking repository
    confidence_unmet: 3   # No change-tracking record means the metal requirement is also unmet
    confidence_na: 0      # N/A is not applicable; software projects must track changes

  - source_criterion: osps_qa_02_01
    # source_level: 1
    # Source: "When the package management system supports it, the source
